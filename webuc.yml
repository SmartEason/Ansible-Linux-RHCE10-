---
# 20260430 11327110 ceUeval8
- hosts: dev
  become: yes
  tasks:
    - name: Create group webuc
      ansible.builtin.group:
        name: webuc
        state: present

    - name: Create directory /webuc
      ansible.builtin.file:
        path: /webuc
        state: directory
        group: webuc
        mode: '0755'

    - name: Create symbolic link for webuc
      ansible.builtin.file:
        src: /webuc
        dest: /var/www/html/webuc
        state: link

    - name: Create index1.html with IP information
      ansible.builtin.copy:
        dest: /webuc/index1.html
        content: "WebTest1 on {{ ansible_default_ipv4.address }}"
